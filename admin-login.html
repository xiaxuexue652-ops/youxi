<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>后台登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a1a2e;color:#fff;font-family:Arial;padding:20px;}
.login-box{max-width:400px;margin:80px auto;background:#16213e;padding:30px;border-radius:10px;}
h2{text-align:center;margin-bottom:25px;color:#00ff88;}
input{width:100%;padding:12px;margin:10px 0;background:#1a1a2e;border:none;border-radius:5px;color:#fff;font-size:16px;}
button{width:100%;padding:12px;background:#00ff88;border:none;border-radius:5px;color:#111;font-size:18px;font-weight:bold;margin-top:10px;cursor:pointer;}
</style>
</head>
<body>
<div class="login-box">
  <h2>管理员登录</h2>
  <input type="text" id="user" placeholder="账号">
  <input type="password" id="pwd" placeholder="密码">
  <button onclick="login()">登录</button>
</div>

<script>
function login(){
  let u = document.getElementById('user').value;
  let p = document.getElementById('pwd').value;
  if(u==='507811224' && p==='ok507811224'){
    localStorage.isAdmin = 'yes';
    location.href='admin.html';
  }else{
    alert('账号或密码错误');
  }
}
</script>
</body>
</html>
