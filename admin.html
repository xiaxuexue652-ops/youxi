<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#191919;color:#fff;padding:15px;}
        h3{color:#ff5e78;margin-bottom:15px;}
        .form-item{margin-bottom:12px;}
        label{display:block;margin-bottom:5px;color:#ccc;}
        input,textarea{width:100%;padding:10px;background:#242424;border:none;border-radius:6px;color:#fff;}
        button{padding:10px 15px;background:#ff5e78;border:none;border-radius:6px;color:#fff;margin-right:10px;margin-top:10px;}
        .tip{color:#aaa;font-size:12px;margin:5px 0;}
    </style>
</head>
<body>
    <h3>发布新游戏</h3>

    <div class="form-item">
        <label>游戏标题</label>
        <input type="text" id="title">
    </div>

    <div class="form-item">
        <label>游戏介绍</label>
        <textarea id="desc" rows="4"></textarea>
    </div>

    <div class="form-item">
        <label>平台</label>
        <input type="text" id="plat" placeholder="PC/安卓">
    </div>

    <div class="form-item">
        <label>版本</label>
        <input type="text" id="ver">
    </div>

    <div class="form-item">
        <label>下载链接</label>
        <input type="text" id="down">
    </div>

    <div class="form-item">
        <label>上传封面（16:9本地图片）</label>
        <input type="file" id="coverFile" accept="image/*">
    </div>

    <div class="form-item">
        <label>上传多张游戏截图（16:9）</label>
        <input type="file" id="imgFiles" accept="image/*" multiple>
    </div>

    <button onclick="saveGame()">提交发布</button>
    <button onclick="logout()">退出登录</button>

    <script>
        // 没登录直接跳登录页
        if(localStorage.getItem("isAdmin") !== "yes"){
            location.href = "admin-login.html";
        }

        let coverUrl = "";
        let imgUrls = [];

        // 封面上传预览
        document.getElementById("coverFile").addEventListener("change",function(e){
            let file = e.target.files[0];
            if(file){
                coverUrl = URL.createObjectURL(file);
                alert("封面已选中，发布时自动生效");
            }
        });

        // 多截图上传
        document.getElementById("imgFiles").addEventListener("change",function(e){
            let files = e.target.files;
            for(let i=0;i<files.length;i++){
                imgUrls.push(URL.createObjectURL(files[i]));
            }
            alert("已选中"+files.length+"张截图");
        });

        // 保存发布
        function saveGame(){
            let title = document.getElementById("title").value.trim();
            let desc = document.getElementById("desc").value.trim();
            let plat = document.getElementById("plat").value.trim();
            let ver = document.getElementById("ver").value.trim();
            let down = document.getElementById("down").value.trim();

            if(!title || !desc || !coverUrl){
                alert("标题、介绍、封面必须填/选");
                return;
            }

            let gameData = JSON.parse(localStorage.getItem("gameData")) || [];
            gameData.push({
                title,desc,plat,ver,down,
                cover:coverUrl,
                imgs:imgUrls,
                view:0
            });
            localStorage.setItem("gameData",JSON.stringify(gameData));
            alert("发布成功！去首页刷新看效果");
            location.reload();
        }

        // 退出
        function logout(){
            localStorage.removeItem("isAdmin");
            location.href = "admin-login.html";
        }
    </script>
</body>
</html>
