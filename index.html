<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>游戏资源站</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial;background:#1a1a2e;color:#fff;padding:20px;}
h1{text-align:center;margin-bottom:15px;color:#00ff88;}
.site-count{text-align:center;color:#aaa;margin-bottom:30px;}
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;max-width:1200px;margin:0 auto;}
.game-card{background:#16213e;border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .3s;}
.game-card:hover{transform:translateY(-5px);}
.game-cover{width:100%;aspect-ratio:16/9;object-fit:cover;}
.game-info{padding:15px;}
.game-title{font-size:18px;margin-bottom:8px;}
.game-views{font-size:13px;color:#888;}
</style>
</head>
<body>
<h1>🎮 游戏资源分享站</h1>
<div class="site-count" id="siteCount">全站访问量：加载中...</div>
<div class="game-grid" id="gameGrid"></div>

<script>
// 全站访问统计
(function(){
  let cnt = localStorage.getItem('siteTotalView') || 0;
  cnt++;
  localStorage.setItem('siteTotalView',cnt);
  document.getElementById('siteCount').innerText = `全站访问量：${cnt} 人次`;
})();

// 单游戏随机浏览量 5000-100000
function getRandView(){
  return Math.floor(Math.random()*95001)+5000;
}

async function loadGames(){
  let res = await fetch('games.json');
  let games = await res.json();
  let wrap = document.getElementById('gameGrid');
  wrap.innerHTML = '';

  games.forEach(g=>{
    let v = localStorage.getItem('v_'+g.id) || getRandView();
    localStorage.setItem('v_'+g.id,v);

    let card = document.createElement('div');
    card.className = 'game-card';
    card.onclick = ()=>location.href='detail.html?id='+g.id;
    card.innerHTML = `
      <img src="${g.cover}" class="game-cover">
      <div class="game-info">
        <h3 class="game-title">${g.title}</h3>
        <div class="game-views">👁️ ${v} 次浏览</div>
      </div>
    `;
    wrap.appendChild(card);
  });
}
window.onload = loadGames;
</script>
</body>
</html>
