<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台登录</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#191919;color:#fff;height:100vh;display:flex;align-items:center;justify-content:center;padding:15px;}
        .login{width:100%;max-width:400px;background:#242424;padding:20px;border-radius:8px;}
        h3{text-align:center;margin-bottom:20px;color:#ff5e78;}
        input{width:100%;padding:12px;margin:10px 0;border:none;border-radius:6px;background:#333;color:#fff;}
        button{width:100%;padding:12px;background:#ff5e78;border:none;border-radius:6px;color:#fff;font-size:16px;margin-top:10px;}
    </style>
</head>
<body>
    <div class="login">
        <h3>管理员登录</h3>
        <input type="text" id="user" placeholder="输入账号">
        <input type="password" id="pwd" placeholder="输入密码">
        <button onclick="login()">登录</button>
    </div>

    <script>
        // 固定账号密码
        const okUser = "507811224";
        const okPwd = "ok507811224";

        function login(){
            let u = document.getElementById("user").value.trim();
            let p = document.getElementById("pwd").value.trim();
            if(u === okUser && p === okPwd){
                localStorage.setItem("isAdmin","yes");
                location.href = "admin.html";
            }else{
                alert("账号或密码错误");
            }
        }
    </script>
</body>
</html>
