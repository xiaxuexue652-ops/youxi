<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>游戏后台发布</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a1a2e;color:#fff;font-family:Arial;padding:20px;}
.box{max-width:800px;margin:0 auto;background:#16213e;padding:25px;border-radius:10px;}
h2{text-align:center;margin-bottom:20px;color:#00ff88;}
.form-item{margin-bottom:18px;}
label{display:block;margin-bottom:6px;font-weight:bold;}
input{width:100%;padding:12px;background:#1a1a2e;border:none;border-radius:5px;color:#fff;font-size:16px;}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.toolbar button,.toolbar select{padding:6px 10px;border:none;border-radius:3px;background:#333;color:#fff;cursor:pointer;}
#editor{width:100%;min-height:320px;padding:12px;background:#1a1a2e;border-radius:5px;color:#fff;}
.preview{margin-top:10px;}
.preview img{max-width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:5px;}
.submit-btn{width:100%;padding:14px;background:#00ff88;color:#111;border:none;border-radius:5px;font-size:18px;font-weight:bold;cursor:pointer;margin-top:10px;}
</style>
</head>
<body>
<div class="box">
  <h2>发布新游戏</h2>
  <div class="form-item">
    <label>游戏名称</label>
    <input type="text" id="title" placeholder="输入游戏名称">
  </div>
  <div class="form-item">
    <label>游戏封面 16:9</label>
    <input type="file" id="coverFile" accept="image/*">
    <div class="preview" id="coverPre"></div>
  </div>
  <div class="form-item">
    <label>游戏详情（可改字体大小、颜色、插图片）</label>
    <div class="toolbar">
      <button onclick="cmd('bold')">加粗</button>
      <button onclick="cmd('italic')">斜体</button>
      <select onchange="fontSize(this.value)">
        <option value="">字体大小</option>
        <option value="1">超小</option>
        <option value="2">小</option>
        <option value="3">中</option>
        <option value="4">大</option>
        <option value="5">超大</option>
      </select>
      <select onchange="fontColor(this.value)">
        <option value="">字体颜色</option>
        <option value="#ffffff">白色</option>
        <option value="#00ff88">绿色</option>
        <option value="#ff5555">红色</option>
        <option value="#55aaff">蓝色</option>
        <option value="#ffff55">黄色</option>
      </select>
      <button onclick="insertImg()">插入图片</button>
      <button onclick="cmd('justifyLeft')">左对齐</button>
      <button onclick="cmd('justifyCenter')">居中</button>
    </div>
    <div id="editor" contenteditable="true"></div>
  </div>
  <div class="form-item">
    <label>下载链接</label>
    <input type="text" id="downUrl" placeholder="网盘/下载地址">
  </div>
  <button class="submit-btn" onclick="saveGame()">发布游戏</button>
</div>

<script>
// 登录校验
if(!localStorage.isAdmin){location.href='admin-login.html';}

// 封面预览
document.getElementById('coverFile').onchange=function(e){
  let f = e.target.files[0];
  if(!f)return;
  let r = new FileReader();
  r.onload=function(){
    document.getElementById('coverPre').innerHTML = `<img src="${r.result}">`;
  }
  r.readAsDataURL(f);
};

// 编辑器命令
function cmd(c){document.execCommand(c,false,null);}
function fontSize(s){document.execCommand('fontSize',false,s);}
function fontColor(c){document.execCommand('foreColor',false,c);}
function insertImg(){
  let url = prompt('输入图片链接：');
  if(url)document.execCommand('insertImage',false,url);
}

// 保存发布
async function saveGame(){
  let title = document.getElementById('title').value.trim();
  let cover = document.querySelector('#coverPre img')?.src;
  let detail = document.getElementById('editor').innerHTML;
  let downUrl = document.getElementById('downUrl').value.trim();

  if(!title||!cover||!detail||!downUrl){
    alert('请填完整信息并上传封面');
    return;
  }

  let games = [];
  try{
    let res = await fetch('games.json');
    games = await res.json();
  }catch(e){}

  games.push({
    id:Date.now(),
    title:title,
    cover:cover,
    detail:detail,
    downloadUrl:downUrl
  });

  let jsonStr = JSON.stringify(games,null,2);
  alert('发布成功！\n\n复制下面全部内容，去GitHub替换games.json里旧内容：\n\n'+jsonStr);
  
  document.getElementById('title').value='';
  document.getElementById('coverFile').value='';
  document.getElementById('coverPre').innerHTML='';
  document.getElementById('editor').innerHTML='';
  document.getElementById('downUrl').value='';
}
</script>
</body>
</html>
