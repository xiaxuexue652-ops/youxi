<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏资源站</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
        body{background:#191919;color:#fff;padding:15px;}
        .title{font-size:22px;color:#ff5e78;text-align:center;margin-bottom:20px;}
        .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;}
        .card{background:#242424;border-radius:8px;overflow:hidden;}
        /* 固定16:9 */
        .img-box{width:100%;height:0;padding-top:56.25%;position:relative;background:#333;}
        .img-box img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;}
        .info{padding:10px;}
        .name{font-size:14px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
        .view{font-size:12px;color:#aaa;text-align:right;margin-top:8px;}
        @media (min-width:768px){.grid{grid-template-columns:repeat(3,1fr);}}
    </style>
    <!-- 访客统计 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-J5X701JNWX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-J5X701JNWX');
    </script>
</head>
<body>
    <h2 class="title">游戏资源分享站</h2>
    <div class="grid" id="gameList"></div>

    <script>
        let gameData = JSON.parse(localStorage.getItem("gameData")) || [];
        const list = document.getElementById("gameList");

        function render(){
            list.innerHTML = "";
            gameData.forEach((item,idx)=>{
                let card = document.createElement("div");
                card.className = "card";
                card.onclick = ()=>location.href = `detail.html?id=${idx}`;
                card.innerHTML = `
                    <div class="img-box">
                        <img src="${item.cover}" alt="">
                    </div>
                    <div class="info">
                        <div class="name">${item.title}</div>
                        <div class="view">浏览 ${item.view || 0}</div>
                    </div>
                `;
                list.appendChild(card);
            });
        }
        render();
    </script>
</body>
</html>
